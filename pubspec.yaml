name: atlas
description: "PagentZ Atlas — Internal admin console for staff to support customer organizations."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Core Firebase (matching main app versions)
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.0.0
  cloud_functions: ^6.0.0

  # Auth providers
  google_sign_in: ^7.1.1

  # State management
  get: ^4.7.2

  # UI
  data_table_2: ^2.5.15
  fl_chart: ^0.68.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  csv: ^6.0.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
